<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KanaGuesser — iOS Design</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Noto+Serif+JP:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #E8E4D0; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box; }
  * { box-sizing: border-box; }
  button:active { transform: scale(0.97); }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="kana-data.jsx"></script>
  <script type="text/babel" src="background.jsx"></script>
  <script type="text/babel" src="draw-canvas.jsx"></script>
  <script type="text/babel" src="home-screen.jsx"></script>
  <script type="text/babel" src="settings-screen.jsx"></script>
  <script type="text/babel" src="game-screen.jsx"></script>
  <script type="text/babel" src="results-screen.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    function Root() {
      return (
        <div style={{ transform: 'scale(1)' }}>
          <IOSDevice width={402} height={874}>
            <div data-screen-label="KanaGuesser App" style={{ position: 'relative', width: '100%', height: '100%' }}>
              <App />
            </div>
          </IOSDevice>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
